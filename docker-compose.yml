services:
  auth-api:
    build: ./auth-api
    ports:
      - "8080:8080"
    environment:
      # URL externe de Railway avec le préfixe JDBC obligatoire
      - SPRING_DATASOURCE_URL=jdbc:mysql://trolley.proxy.rlwy.net:33285/railway?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ptiMFPCcoDMTZpodGUPZcfEZLcbAHFar
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  b2b-inventory-api:
    build: ./b2b-inventory-api
    ports:
      - "8081:8081"
    environment:
      - AUTH_API_URL=http://auth-api:8080
      # On utilise la même base pour l'inventaire
      - SPRING_DATASOURCE_URL=jdbc:mysql://trolley.proxy.rlwy.net:33285/railway?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ptiMFPCcoDMTZpodGUPZcfEZLcbAHFar
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL_AUTH=http://localhost:8080
      - VITE_API_URL_INVENTORY=http://localhost:8081